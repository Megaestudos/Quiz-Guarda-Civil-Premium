<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=0"/>
  <title>Guarda Civil — App Profissional</title>
  <meta name="theme-color" content="#0B0F19"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Phosphor Icons para icones premium -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
  <!-- Efeitos de luz ao fundo (Glow Premium) -->
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <div class="app" id="appRoot">
    <div class="card header" id="cardHeader">
      <div class="header-titles">
        <div class="header-icon-wrapper">
          <i class="ph-fill ph-shield-star"></i>
        </div>
        <div>
          <h1 class="title">Guarda Civil</h1>
          <div class="subtitle">Plataforma de Estudos</div>
        </div>
      </div>
      <div class="controls">
        <div class="scale-controls">
          <button class="icon-btn" id="scaleDownBtn" title="Diminuir"><i class="ph ph-minus"></i></button>
          <div class="scale-label" id="scaleLabel">1.00x</div>
          <button class="icon-btn" id="scaleUpBtn" title="Aumentar"><i class="ph ph-plus"></i></button>
        </div>
        <button class="icon-btn" id="soundToggle" title="Alternar Som">
          <i class="ph ph-speaker-high" id="soundIcon"></i>
        </button>
        <button class="icon-btn" id="fullscreenBtn" title="Tela Cheia"><i class="ph ph-arrows-out"></i></button>
      </div>
    </div>

    <div class="pages" id="pages">
      <section id="home" class="page active card">
        <div class="welcome"><strong>Bem-vindo(a) recruta!</strong> Prepare-se para sua aprovação. Escolha uma modalidade:</div>
        <div class="home-actions">
          <button class="btn btn-primary" onclick="go('study')">
            <i class="ph ph-book-open"></i> <span>Estudar Leis</span>
          </button>
          <button class="btn btn-primary" onclick="go('quiz')">
            <i class="ph ph-target"></i> <span>Fazer Simulado</span>
          </button>
          <button class="btn btn-secondary" onclick="go('cards')">
            <i class="ph ph-cards"></i> <span>Flashcards</span>
          </button>
          <a href="./resumos/" class="btn btn-secondary">
            <i class="ph ph-file-text"></i> <span>Resumos</span>
          </a>
        </div>
        <div class="record-box">
          <div id="bestRecord" class="record-content">
            <i class="ph ph-spinner-gap ph-spin"></i> Carregando recorde...
          </div>
        </div>
      </section>

      <section id="study" class="page card">
        <div class="page-top-bar">
          <h3 class="page-title"><i class="ph ph-books"></i> Conteúdos</h3>
          <button class="btn-sm" onclick="go('home')"><i class="ph ph-arrow-left"></i> Voltar</button>
        </div>
        <div id="studyList" class="study-list">Carregando conteúdos...</div>
      </section>

      <section id="quiz" class="page card">
        <div class="quiz-shell">
          <div class="page-header-actions">
            <div class="topic-selector">
              <label for="topicSelect"><i class="ph ph-funnel"></i> Tópico</label>
              <select id="topicSelect"></select>
            </div>
            <button class="btn btn-primary btn-start" id="loadTopicBtn">
              <i class="ph-fill ph-play-circle"></i> Iniciar
            </button>
          </div>

          <div class="progress-container">
            <div class="progress-info">
              <span id="progressText" class="score-text">Pontos: 0</span>
              <span id="progressInfo" class="count-text">0 / 0</span>
            </div>
            <div class="progress">
              <div class="track"><div class="bar" id="bar"></div></div>
            </div>
          </div>

          <div class="quiz-main">
            <div class="question-box" id="question">
              <!-- Content injected via JS -->
              <div class="empty-state">
                <i class="ph ph-hand-pointing"></i>
                <p>Selecione um tópico para começar.</p>
              </div>
            </div>
            <div class="opts" id="opts"></div>
            <div class="explain" id="explain" style="display:none"></div>
          </div>

          <div class="quiz-footer">
            <button class="btn btn-secondary" id="btnRestart" onclick="restartQuiz()" style="display:none">
              <i class="ph ph-arrows-clockwise"></i> Reiniciar
            </button>
            <button class="btn btn-next" id="nextBtn" disabled>
              Próxima <i class="ph ph-arrow-right"></i>
            </button>
          </div>
        </div>
      </section>

      <section id="cards" class="page card">
        <div class="page-top-bar">
          <h3 class="page-title"><i class="ph ph-cards"></i> Flashcards</h3>
          <button class="btn-sm" onclick="go('home')"><i class="ph ph-arrow-left"></i> Voltar</button>
        </div>
        <div id="cardsContainer" class="cards-grid"></div>
      </section>
    </div>
  </div>

  <div class="tabs-nav" role="navigation" id="tabsBar">
    <button class="tabbtn active" data-target="home" onclick="go('home')">
      <i class="ph ph-house"></i>
      <span>Início</span>
    </button>
    <button class="tabbtn" data-target="study" onclick="go('study')">
      <i class="ph ph-book-open"></i>
      <span>Estudo</span>
    </button>
    <button class="tabbtn" data-target="quiz" onclick="go('quiz')">
      <i class="ph ph-target"></i>
      <span>Simulado</span>
    </button>
    <button class="tabbtn" data-target="cards" onclick="go('cards')">
      <i class="ph ph-cards"></i>
      <span>Cartões</span>
    </button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB36ZszS8v_DeOn3at7zEo_tFq86WU0sI4",
      authDomain: "simulados-concursos-22c91.firebaseapp.com",
      projectId: "simulados-concursos-22c91",
      storageBucket: "simulados-concursos-22c91.firebasestorage.app",
      messagingSenderId: "863699339166",
      appId: "1:863699339166:web:8514155da2229b41ae388f"
    };
    firebase.initializeApp(firebaseConfig);
  </script>

  <script src="./js/app.js"></script>
</body>
</html>

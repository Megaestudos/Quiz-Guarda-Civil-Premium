<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Quiz Guarda Civil</title>
  <meta name="theme-color" content="#1e3c72"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="app" id="appRoot">
    <div class="card header" id="cardHeader">
      <div>
        <h1 class="title">Guarda Civil 👮‍♂️</h1>
        <div class="subtitle">Plataforma de Estudos</div>
      </div>
      <div class="controls">
        <div style="display:flex;gap:5px">
          <button class="icon-btn" id="scaleDownBtn">A−</button>
          <div class="scale-label" id="scaleLabel">x1.00</div>
          <button class="icon-btn" id="scaleUpBtn">A+</button>
        </div>
        <button class="icon-btn" id="soundToggle">🔊</button>
      </div>
    </div>

    <div class="card pages" id="pages">
      <section id="home" class="page active">
        <div class="welcome">Bem-vindo! Escolha uma opção:</div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">🏆</div>
            <div class="stat-value" id="bestScoreStat">--</div>
            <div class="stat-label">Melhor</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🔥</div>
            <div class="stat-value" id="streakStat">0</div>
            <div class="stat-label">Dias</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📚</div>
            <div class="stat-value" id="questionsStat">0</div>
            <div class="stat-label">Questões</div>
          </div>
        </div>
        <div class="home-actions">
          <button class="btn" onclick="go('study')">📘 Estudar</button>
          <button class="btn" onclick="go('quiz')">🎯 Simulado</button>
          <button class="btn" onclick="go('cards')">🃏 Flashcards</button>
        </div>
        <div style="margin-top:25px;">
          <h4 style="margin:0 0 10px 0;color:var(--accent)">📈 Desempenho</h4>
          <div id="performanceChart" style="min-height:240px;"></div>
        </div>
      </section>

      <section id="study" class="page">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
          <h3>📚 Conteúdos</h3>
          <button class="btn" onclick="go('home')" style="padding:6px 12px;">🏠 Voltar</button>
        </div>
        <div id="studyList" style="text-align:center;padding:40px;">Em breve!</div>
      </section>

      <section id="quiz" class="page">
        <div class="quiz-shell">
          <div
style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
            <div style="display:flex;align-items:center;gap:10px;flex:1;">
              <span style="font-weight:700;">Tópico:</span>
              <select id="topicSelect" style="flex:1;min-width:140px;"></select>
              <button class="next-btn" id="loadTopicBtn" style="padding:8px 15px;">Iniciar</button>
            </div>
          </div>
          <div class="progress">
            <div class="track"><div class="bar" id="bar"></div></div>
            <div style="font-size:12px;font-weight:800;" id="progressInfo">0 / 0</div>
          </div>
          <div class="quiz-main">
            <div class="question" id="question">Selecione um tópico.</div>
            <div class="opts" id="opts"></div>
            <div class="explain" id="explain" style="display:none"></div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;">
            <div id="progressText" style="font-weight:700;color:var(--accent);"></div>
            <div style="display:flex;gap:10px;">
              <button class="btn" id="btnRestart" onclick="restartQuiz()" style="display:none">🔄</button>
              <button class="next-btn" id="nextBtn" disabled>Próxima ➜</button>
            </div>
          </div>
        </div>
      </section>

      <section id="cards" class="page">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
          <h3>🃏 Flashcards</h3>
          <button class="btn" onclick="go('home')" style="padding:6px 12px;">🏠 Voltar</button>
        </div>
        <div id="cardsContainer" style="text-align:center;padding:40px;">Em breve!</div>
      </section>
    </div>
  </div>

  <div class="tabs" id="tabsBar">
    <button class="tabbtn active" onclick="go('home')">🏠 Início</button>
    <button class="tabbtn" onclick="go('study')">📘 Estudo</button>
    <button class="tabbtn" onclick="go('quiz')">🎯 Simulado</button>
    <button class="tabbtn" onclick="go('cards')">🃏 Cartões</button>
  </div>

  <script>
    // ===== JAVASCRIPT EMBUTIDO (SEM ARQUIVO SEPARADO!) =====
    var POOL=[],currentIndex=0,score=0,quizStarted=false;
    var SOUND_KEY="quiz_sound",SCALE_KEY="quiz_scale",BEST_KEY="quiz_best";
    var STREAK_KEY="quiz_streak",QUESTIONS_KEY="quiz_questions";

    function go(target){
      console.log("Indo para:",target);
      document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
      document.getElementById(target).classList.add("active");
      document.querySelectorAll(".tabbtn").forEach(function(b){

b.classList.toggle("active",b.innerText.toLowerCase().includes(target==="study"?"estudo":target==="quiz"?"simulado"b.classList.toggle("active",b.innerText.toLowerCase().includes(target==="study"?"estudo":target==="quiz"?"smulado":target==="cards"?"cartões":"início"));
      });
      if(target==="home"){showBest();loadStats();setTimeout(renderChart,400);}
      if(target==="quiz"&&!quizStarted){initQuiz();}
    }

    function setScale(v){
      v=Math.max(0.8,Math.min(1.4,Number(v)));
      document.getElementById("appRoot").style.transform="scale("+v.toFixed(2)+")";
      document.getElementById("appRoot").style.transformOrigin="top center";
      document.getElementById("scaleLabel").innerText="x"+v.toFixed(2);
      localStorage.setItem(SCALE_KEY,v.toFixed(2));
    }

    function showBest(){
      var r=JSON.parse(localStorage.getItem(BEST_KEY)||"null");
      var el=document.getElementById("bestScoreStat");
      if(el)el.innerText=r?r.pct+"%":"--";
    }

    function loadStats(){
      var q=document.getElementById("questionsStat");
      var s=document.getElementById("streakStat");
      if(q)q.innerText=localStorage.getItem(QUESTIONS_KEY)||"0";
      if(s)s.innerText=localStorage.getItem(STREAK_KEY)||"0";
    }

    function initQuiz(){
      var s=document.getElementById("topicSelect");
      s.innerHTML='<option value="Todos">Todos</option><option value="Demo">Modo Demo</option>';
    }

    function loadQuiz(topic){
      document.getElementById("question").innerText="Carregando...";
      POOL=[
        {pergunta:"Qual lei regula o Estatuto da Guarda Civil?",A:"Lei 13.022/2014",B:"Lei 8.112/1990",C:"Lei
10.406/2002",D:"Lei 9.784/1999",resposta:"A",explicacao:"Lei 13.022/2014."},
        {pergunta:"Qual princípio exige
publicidade?",A:"Legalidade",B:"Publicidade",C:"Impessoalidade",D:"Moralidade",resposta:"B",explicacao:"Princípio
da Publicidade."},
        {pergunta:"O que significa ECA?",A:"Estatuto do Cidadão",B:"Estatuto da Criança e do
Adolescente",C:"Estatuto de Capacitação",D:"Estatuto de Conduta",resposta:"B",explicacao:"ECA = Lei 8.069/1990."}
      ];
      currentIndex=0;score=0;quizStarted=true;
      renderQuestion();
    }

    function renderQuestion(){
      document.getElementById("explain").style.display="none";
      document.getElementById("nextBtn").disabled=true;
      if(currentIndex>=POOL.length){finishQuiz();return;}
      var q=POOL[currentIndex];
      document.getElementById("question").innerText=q.pergunta;
      var o=document.getElementById("opts");
      o.innerHTML="";
      ["A","B","C","D"].forEach(function(l){
        if(!q[l])return;
        var btn=document.createElement("button");
        btn.className="opt";
        btn.innerHTML="<span style=\"color:var(--accent);margin-right:10px;font-weight:900\">"+l+")</span>"+q[l];
        btn.onclick=function(){selectOption(l);};
        o.appendChild(btn);
      });
      updateProgress();
    }

    function selectOption(letter){
      var q=POOL[currentIndex];
      var c=q.resposta;
      document.querySelectorAll(".opt").forEach(function(b){b.disabled=true;});
      document.getElementById("opt_"+c).classList.add("correct");
      if(letter!==c)document.getElementById("opt_"+letter).classList.add("wrong");
      else score++;
      var e=document.getElementById("explain");
      e.style.display="block";
      e.innerHTML="<strong style=\"color:var(--accent)\">"+(letter===c?"✅ Correto!":"❌
Errado!")+"</strong><br>"+q.explicacao;
      document.getElementById("nextBtn").disabled=false;
      var cq=parseInt(localStorage.getItem(QUESTIONS_KEY)||"0");
      localStorage.setItem(QUESTIONS_KEY,cq+1);
    }

    function updateProgress(){
      var p=POOL.length?Math.round((currentIndex/POOL.length)*100):0;
      document.getElementById("bar").style.width=p+"%";
      document.getElementById("progressInfo").innerText=(currentIndex+1)+" / "+POOL.length;
      document.getElementById("progressText").innerText="Pontos: "+score;
    }

    function finishQuiz(){
      quizStarted=false;
      document.getElementById("question").innerHTML="🎉 Fim! Acertou <strong>"+score+"</strong> de "+POOL.length;
      document.getElementById("opts").innerHTML="";
      document.getElementById("btnRestart").style.display="block";
      var pct=Math.round((score/POOL.length)*100);
      var prev=JSON.parse(localStorage.getItem(BEST_KEY)||"null");
      if(!prev||pct>prev.pct)localStorage.setItem(BEST_KEY,JSON.stringify({pct:pct}));
    }

    function restartQuiz(){
      document.getElementById("btnRestart").style.display="none";
      quizStarted=false;
      initQuiz();
      document.getElementById("question").innerText="Selecione um tópico.";
      document.getElementById("opts").innerHTML="";
      document.getElementById("bar").style.width="0%";
      document.getElementById("progressInfo").innerText="0 / 0";
      document.getElementById("progressText").innerText="";
    }

    function renderChart(){
      var c=document.getElementById("performanceChart");
      if(!c)return;
      if(typeof ApexCharts==="undefined"){setTimeout(renderChart,500);return;}
      var days=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
      var dp=days.map(function(){return Math.floor(Math.random()*35+60);});
      var opt={
        series:[{name:"Acertos",data:dp}],
        chart:{type:"area",height:240,toolbar:{show:false}},
        colors:["#00ff9d"],
        stroke:{curve:"smooth",width:3},
        fill:{type:"gradient",gradient:{opacityFrom:0.5,opacityTo:0.05}},
        xaxis:{categories:days,labels:{style:{colors:"rgba(255,255,255,0.6)"}}},
        yaxis:{show:false},
        tooltip:{theme:"dark"}
      };
      new ApexCharts(c,opt).render();
    }

    // ===== INICIALIZAÇÃO =====
    document.getElementById("scaleUpBtn").onclick=function(){setScale(parseFloat(localStorage.getItem(SCALE_KEY)||"document.getElementById("scaleUpBtn").onclick=function(){setScale(parseFloat(localStorage.getItem(SCALE_KEY)||"1")+0.05);};
    document.getElementById("scaleDownBtn").onclick=function(){setScale(parseFloat(localStorage.getItem(SCALE_KEY)|document.getElementById("scaleDownBtn").onclick=function(){setScale(parseFloat(localStorage.getItem(SCALE_KEY)||"1")-0.05);};
    setScale(localStorage.getItem(SCALE_KEY)||"1");

    document.getElementById("soundToggle").onclick=function(){
      var c=localStorage.getItem(SOUND_KEY)!=="0";
      localStorage.setItem(SOUND_KEY,c?"0":"1");
      this.innerText=c?"🔇":"";
    };
    document.getElementById("soundToggle").innerText=localStorage.getItem(SOUND_KEY)==="0"?"🔇":"🔊";

    document.getElementById("loadTopicBtn").onclick=function(){
      loadQuiz(document.getElementById("topicSelect").value);
    };

    document.getElementById("nextBtn").onclick=function(){currentIndex++;renderQuestion();};

    // Inicial
    showBest();
    loadStats();
    console.log("✅ App pronto!");
  </script>
</body>
</html>

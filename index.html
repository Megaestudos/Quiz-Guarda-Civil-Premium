<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Acesso — PlenAula</title>
  <meta name="theme-color" content="#0B0F19"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --primary: #3B82F6;
      --bg-dark: #070A0F;
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #FFFFFF;
      --text-muted: #94A3B8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background-color: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-main);
      overflow: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: #121926;
      border: 1px solid var(--card-border);
      padding: 48px 32px;
      border-radius: 28px;
      box-shadow: 0 40px 100px -20px rgba(0,0,0,0.8);
      text-align: center;
    }

    .logo-box {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
    }
    .logo-box img { width: 38px; height: 38px; }

    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }
    h1 span { color: var(--primary); }

    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      margin-left: 4px;
    }

    .input-wrapper { position: relative; }
    .input-wrapper input {
      width: 100%;
      padding: 14px 16px;
      background: #FFFFFF;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #000;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .input-wrapper input::placeholder { color: #94A3B8; }
    
    .btn-show-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #64748B;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #3B82F6 0%, #2563EB 100%);
      color: #FFFFFF;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.5);
      transition: all 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.6); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

    .signup-text {
      margin-top: 32px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .signup-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="login-container">
     <div class="login-card">
        <div class="logo-box">
           <img src="./assets/logo.png" alt="Logo" />
        </div>
        
        <h1>Acesse o seu <span>Aplicativo</span></h1>
        
        <form id="mainLoginForm">
           <div class="form-group">
              <label>E-mail</label>
              <div class="input-wrapper">
                 <input type="email" id="loginEmail" placeholder="Digite seu email" required />
              </div>
           </div>
           
           <div class="form-group">
              <label>Senha</label>
              <div class="input-wrapper">
                 <input type="password" id="loginPassword" placeholder="Sua senha" required />
                 <button type="button" class="btn-show-pass" id="togglePass">
                    <i class="ph ph-eye"></i>
                 </button>
              </div>
           </div>
           
           <button type="submit" class="btn-login" id="submitBtn">Entrar no Painel</button>
        </form>
        
        <div class="signup-text">
           Ainda não tem conta? <a href="#">Criar agora!</a>
        </div>
     </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  
  <script src="./js/auth.js"></script>
  <script>
    const loginForm = document.getElementById('mainLoginForm');
    const submitBtn = document.getElementById('submitBtn');
    const togglePass = document.getElementById('togglePass');
    const passInput = document.getElementById('loginPassword');

    // Toggle Password Visibility
    togglePass.addEventListener('click', () => {
      const type = passInput.type === 'password' ? 'text' : 'password';
      passInput.type = type;
      togglePass.innerHTML = type === 'password' ? '<i class="ph ph-eye"></i>' : '<i class="ph ph-eye-slash"></i>';
    });

    // Handle Form Submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const pass = passInput.value;

      submitBtn.disabled = true;
      submitBtn.innerText = 'Verificando...';

      try {
        await loginWithEmailPassword(email, pass);
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Entrar no Painel';
      }
    });

    // Auto-redirect handled in auth.js
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=0"/>
  <title>Acesso — PlenAula</title>
  <meta name="theme-color" content="#0F172A"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <link rel="stylesheet" href="./styles.css?v=20260624">

  <style>
    :root {
      --saas-bg: #0F172A;
      --saas-card: rgba(30, 41, 59, 0.7);
      --saas-primary: #2563EB;
      --saas-accent: #38BDF8;
      --saas-text: #FFFFFF;
      --saas-muted: #94A3B8;
      --saas-border: rgba(255, 255, 255, 0.08);
    }

    body, html { 
      margin: 0; padding: 0; 
      background: var(--saas-bg); 
      min-height: 100vh; 
      font-family: 'Inter', sans-serif;
      color: var(--saas-text);
      overflow-x: hidden;
    }

    /* LIVING BACKGROUND */
    canvas#canvas-particles {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
    }
    .mesh-gradient {
      position: fixed; inset: 0; z-index: 0;
      background: 
        radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
        radial-gradient(at 50% 50%, rgba(15, 23, 42, 1) 0px, transparent 100%);
      animation: meshMove 20s infinite alternate-reverse;
    }
    @keyframes meshMove {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    /* AUTH COMPONENTS */
    .saas-container {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 20px; box-sizing: border-box;
      perspective: 1200px;
    }

    .saas-card {
      width: 100%; max-width: 420px;
      padding: 40px; border-radius: 32px;
      background: var(--saas-card);
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--saas-border);
      box-shadow: 0 40px 100px -20px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05);
      position: relative; transform-style: preserve-3d;
      opacity: 0;
    }

    .saas-header { text-align: center; margin-bottom: 36px; }
    .saas-logo { height: 68px; margin-bottom: 16px; filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.3)); }
    .saas-subtitle { color: var(--saas-muted); font-size: 17px; font-weight: 600; margin: 0; letter-spacing: -0.2px; }

    .view-pane { display: none; }
    .view-pane.active { display: block; }

    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--saas-muted); margin-bottom: 8px; }
    
    .input-wrapper {
      display: flex; align-items: center; gap: 10px; padding-left: 18px;
      background: rgba(0,0,0,0.25); border-radius: 16px;
      border: 1px solid var(--saas-border); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .input-wrapper:focus-within {
      border-color: var(--saas-primary); background: rgba(37, 99, 235, 0.08);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
    .input-wrapper i { color: var(--saas-muted); font-size: 22px; flex-shrink: 0; }
    .input-wrapper input {
      flex: 1; padding: 16px 0; background: transparent;
      border: none; color: white; font-family: inherit; font-size: 16px; outline: none;
    }
    .btn-eye { 
      background: none; border: none; color: var(--saas-muted); cursor: pointer; 
      padding: 0 18px; height: 100%; display: flex; align-items: center; justify-content: center;
      transition: color 0.2s; flex-shrink: 0;
    }
    .btn-eye:hover { color: var(--saas-primary); }

    .saas-link { color: var(--saas-primary); text-decoration: none; font-weight: 600; transition: opacity 0.2s; }
    .saas-link:hover { opacity: 0.8; }

    .btn-saas-primary {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      background: #2563EB; /* Fallback */
      background: var(--saas-primary); color: #FFFFFF !important; font-weight: 700; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; overflow: hidden; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
      opacity: 1 !important; visibility: visible !important;
      display: flex !important;
    }
    .btn-saas-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.5); }
    .btn-saas-primary:active { transform: translateY(0) scale(0.98); }
    
    /* Dynamic Shine Effect */
    .btn-saas-primary::after {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: rotate(45deg); transition: 0.6s;
    }
    .btn-saas-primary:hover::after { left: 100%; }

    .saas-footer { text-align: center; margin-top: 32px; font-size: 14px; color: var(--saas-muted); }
    
    .saas-error { color: #F87171; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
    .saas-success { color: #34D399; font-size: 13px; text-align: center; margin-top: 12px; display: none; }

    /* LOADER */
    #saas-loader { position: fixed; inset: 0; background: var(--saas-bg); z-index: 9999; display: flex; gap: 8px; align-items: center; justify-content: center; }
    .dot { width: 10px; height: 10px; background: var(--saas-primary); border-radius: 50%; animation: dotPulse 1.5s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.5); opacity: 0.3; } }

    @media (max-width: 480px) {
      .saas-card { 
        padding: 40px 24px; 
        border-radius: 24px; 
        width: 92%; 
        max-width: 360px; 
        background: rgba(30, 41, 59, 0.4); /* Mais transparente no mobile */
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      }
      .saas-container { 
        padding: 20px 0; 
        overflow-y: auto;
        align-items: flex-start;
      }
      .saas-header { margin-bottom: 28px; }
      .saas-logo { height: 58px; }
      .saas-subtitle { font-size: 15px; }
    }
  </style>
</head>

<body>
  <div id="saas-loader">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <canvas id="canvas-particles"></canvas>
  <div class="mesh-gradient"></div>

  <main class="saas-container">
    <div class="saas-card" id="mainCard">
      <header class="saas-header">
        <img src="./assets/logo.webp" alt="PlenAula Logo" class="saas-logo">
        <p class="saas-subtitle">Acesso à plataforma de estudos</p>
      </header>

      <div id="loginView" class="view-pane active">
        <div class="form-group">
          <label>E-mail</label>
          <div class="input-wrapper">
            <i class="ph ph-envelope-simple"></i>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
          </div>
        </div>

        <div class="form-group">
          <label>Senha de Acesso</label>
          <div class="input-wrapper">
            <i class="ph ph-lock-simple"></i>
            <input type="password" id="loginPassword" placeholder="••••••••">
            <button class="btn-eye" type="button" onclick="togglePassword('loginPassword')"><i class="ph ph-eye"></i></button>
          </div>
        </div>

        <div id="loginError" class="saas-error"></div>
        <div id="loginMessage" class="saas-success"></div>

        <button class="btn-saas-primary" id="loginBtn" onclick="handleLoginSubmit()">
          Acessar Plataforma <i class="ph ph-arrow-right"></i>
        </button>

        <footer class="saas-footer">
          <p>Não tem conta? <a href="#" class="saas-link" onclick="toggleAuthMode()">Criar Agora</a></p>
          <p style="margin-top: 12px;"><a href="#" class="saas-link" style="font-size: 13px; opacity: 0.7;" onclick="showForgotView()">Esqueceu sua senha?</a></p>
        </footer>
      </div>

      <div id="registerView" class="view-pane">
        <div class="form-group">
          <label>Seu Nome</label>
          <div class="input-wrapper">
            <i class="ph ph-user"></i>
            <input type="text" id="regName" placeholder="Como quer ser chamado?">
          </div>
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <div class="input-wrapper">
            <i class="ph ph-envelope-simple"></i>
            <input type="email" id="regEmail" placeholder="seu@email.com">
          </div>
        </div>
        <div class="form-group">
          <label>Nova Senha</label>
          <div class="input-wrapper">
            <i class="ph ph-lock-simple"></i>
            <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres">
            <button class="btn-eye" type="button" onclick="togglePassword('regPassword')"><i class="ph ph-eye"></i></button>
          </div>
        </div>

        <div id="regError" class="saas-error"></div>

        <button class="btn-saas-primary" id="regBtn" onclick="handleRegisterSubmit()">
          Criar Conta e Acessar
        </button>

        <footer class="saas-footer">
          Já possui conta? <a href="#" class="saas-link" onclick="toggleAuthMode()">Fazer Login</a>
        </footer>
      </div>

      <div id="forgotView" class="view-pane">
        <div class="form-group">
          <label>E-mail da Conta</label>
          <div class="input-wrapper">
            <i class="ph ph-envelope-simple"></i>
            <input type="email" id="forgotEmail" placeholder="seu@email.com">
          </div>
        </div>
        <div id="forgotError" class="saas-error"></div>
        <div id="forgotMessage" class="saas-success"></div>

        <button class="btn-saas-primary" id="forgotBtn" onclick="submitForgotPassword()">
          Enviar Link de Recuperação
        </button>

        <footer class="saas-footer">
          <a href="#" class="saas-link" onclick="showLoginView()">Voltar ao Login</a>
        </footer>
      </div>
    </div>
  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/subscription.js"></script>

  <script>
    /* SAAS 2026 ENGINE */
    const canvas = document.getElementById('canvas-particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null };

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * (window.innerWidth < 480 ? 3 : 2) + 1; // Maiores no mobile para visibilidade
        this.speedX = (Math.random() - 0.5) * (window.innerWidth < 480 ? 0.8 : 0.4); // Mais rápidos no mobile
        this.speedY = (Math.random() - 0.5) * (window.innerWidth < 480 ? 0.8 : 0.4);
        this.color = Math.random() > 0.5 ? '#38BDF8' : '#2563EB';
        this.opacity = Math.random() * 0.4 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (mouse.x && mouse.y) {
          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 150) {
            this.x -= dx * 0.01;
            this.y -= dy * 0.01;
          }
        }
        if (this.x < 0 || this.x > canvas.width) this.reset();
        if (this.y < 0 || this.y > canvas.height) this.reset();
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.beginPath();ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function init() {
      particles = [];
      for(let i=0; i<70; i++) particles.push(new Particle());
      function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
      }
      animate();
    }

    function handleMove(e) {
        const xPos = e.touches ? e.touches[0].pageX : e.pageX;
        const yPos = e.touches ? e.touches[0].pageY : e.pageY;
        mouse.x = xPos; mouse.y = yPos;
    }

    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove, { passive: false });

    /* WORKFLOWS */
    let isLoginMode = true;
    function showLoginView() {
      isLoginMode = true;
      document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
      document.getElementById('loginView').classList.add('active');
    }
    function showForgotView() {
      document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
      document.getElementById('forgotView').classList.add('active');
    }
    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
      document.getElementById(isLoginMode ? 'loginView' : 'registerView').classList.add('active');
      gsap.from('.view-pane.active', { y: 10, opacity: 0, duration: 0.4 });
    }
    function togglePassword(id) {
      const el = document.getElementById(id);
      const btn = el.closest('.input-wrapper').querySelector('.btn-eye i');
      if (el.type === 'password') {
        el.type = 'text';
        btn.classList.remove('ph-eye');
        btn.classList.add('ph-eye-slash');
      } else {
        el.type = 'password';
        btn.classList.remove('ph-eye-slash');
        btn.classList.add('ph-eye');
      }
    }

    /* AUTH HANDLERS */
    async function handleLoginSubmit() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      err.style.display = 'none';
      if(!email || !pass) { err.innerText = "Preencha todos os campos."; err.style.display='block'; return;}
      btn.innerHTML = '<i class="ph ph-spinner-gap ph-spin"></i> Entrando...';
      btn.disabled = true;
      try { await loginWithEmail(email, pass); } 
      catch (e) { err.innerText = e.message; err.style.display='block'; btn.innerHTML = 'Acessar Plataforma <i class="ph ph-arrow-right"></i>'; btn.disabled = false; }
    }

    async function handleRegisterSubmit() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value;
      const err = document.getElementById('regError');
      const btn = document.getElementById('regBtn');
      err.style.display = 'none';
      if(!name || !email || !pass) { err.innerText='Preencha tudo.'; err.style.display='block'; return;}
      btn.innerHTML = '<i class="ph ph-spinner-gap ph-spin"></i> Criando...';
      btn.disabled = true;
      try { await registerWithEmail(name, email, pass); } 
      catch (e) { err.innerText = e.message; err.style.display='block'; btn.innerHTML = 'Criar Conta e Acessar'; btn.disabled = false; }
    }

    async function submitForgotPassword() {
      const email = document.getElementById('forgotEmail').value.trim();
      const err = document.getElementById('forgotError');
      const msg = document.getElementById('forgotMessage');
      const btn = document.getElementById('forgotBtn');
      err.style.display = 'none'; msg.style.display='none';
      if(!email) { err.innerText='Digite seu e-mail.'; err.style.display='block'; return; }
      btn.disabled = true; btn.innerHTML = '<i class="ph ph-spinner-gap ph-spin"></i> Enviando...';
      try { await sendPasswordReset(email); msg.innerText = "Link enviado!"; msg.style.display='block'; }
      catch (e) { err.innerText = e.message; err.style.display='block'; }
      finally { btn.disabled = false; btn.innerHTML = 'Enviar Link de Recuperação'; }
    }

    /* ENTRANCE ANIMATION */
    window.onload = () => {
      init();
      const tl = gsap.timeline();
      tl.to('#saas-loader', { opacity: 0, duration: 0.8, delay: 0.5, onComplete: () => document.getElementById('saas-loader').remove() })
        .to('.saas-card', { opacity: 1, y: 0, duration: 1, ease: 'expo.out' }, "-=0.3")
        .from('.saas-logo', { scale: 0.9, opacity: 0, duration: 0.8 }, "-=0.6")
        .from('.saas-subtitle', { opacity: 0, y: 10, duration: 0.5 }, "-=0.4")
        .from('.form-group', { opacity: 0, y: 20, stagger: 0.1, duration: 0.8 }, "-=0.4")
        .from('.btn-saas-primary', { y: 20, duration: 0.8 }, "-=0.4");
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>PlenAula — Entre na sua Conta</title>
  <meta name="theme-color" content="#0B0F19"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="./styles.css?v=2.7">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #070A0F;
      overflow: hidden;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 10;
      animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .login-modal-card {
      background: white;
      color: #333;
      padding: 40px;
      border-radius: 24px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
      text-align: center;
    }
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }
    .logo-text {
      font-size: 32px;
      font-weight: 900;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-badge-icon {
      margin: 0 auto 10px;
      width: 60px;
      height: 60px;
      background: #fef2f2;
      color: #ef4444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h2 {
       font-size: 20px;
       font-weight: 700;
       color: #111;
       margin-bottom: 20px;
    }
  </style>
</head>
<body class="landing-body">
  <div class="ambient-glow glow-1" style="width: 80vw; height: 80vw;"></div>
  <div class="ambient-glow glow-2" style="width: 60vw; height: 60vw;"></div>
  
  <div class="login-container">
    <div class="login-logo">
       <img src="./assets/logo.png" style="height: 64px; object-fit: contain;" alt="Logo" />
       <span class="logo-text">PlenAula</span>
    </div>

    <div class="login-modal-card">
       <div class="login-badge-icon"><i class="ph-fill ph-shield-check"></i></div>
       <h2>Sua Aprovação Começa Aqui!<br>Entre para estudar:</h2>
       
       <button class="btn btn-facebook" style="width: 100%;">
           <i class="ph-fill ph-facebook-logo" style="font-size:20px;"></i> Entrar com Facebook
       </button>
       <button class="btn btn-google btn-google-login" style="width: 100%;">
           <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" style="width: 18px;" /> Entrar com Google
       </button>
       
       <div class="login-form">
          <label>E-mail</label>
          <input type="email" placeholder="Seu email" />
          
          <label>Senha</label>
          <div class="input-pass">
              <input type="password" placeholder="Sua senha" />
          </div>
          
          <button class="btn btn-primary" style="width: 100%; margin-top: 10px;">Entrar</button>
       </div>
       
       <a href="#" class="forgot-link">Esqueceu a senha?</a>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  
  <script src="./js/auth.js"></script>
  <script src="./js/subscription.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>

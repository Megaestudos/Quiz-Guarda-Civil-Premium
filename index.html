<body>
  <div class="app" id="appRoot">
    <!-- Header -->
    <div class="card header" id="cardHeader">
      <div>
        <h1 class="title">Guarda Civil 👮‍♂️</h1>
        <div class="subtitle">Plataforma de Estudos Inteligente</div>
      </div>
      <div class="controls">
        <div style="display:flex; gap:5px; align-items:center;">
          <button class="icon-btn" id="scaleDownBtn" title="Diminuir">A−</button>
          <div class="scale-label" id="scaleLabel">x1.00</div>
          <button class="icon-btn" id="scaleUpBtn" title="Aumentar">A+</button>
        </div>
        <button class="icon-btn" id="soundToggle" title="Alternar Som">🔊</button>
        <button class="icon-btn" id="fullscreenBtn" title="Tela Cheia">⛶</button>
      </div>
    </div>

    <!-- Pages -->
    <div class="card pages" id="pages">

      <!-- Home -->
      <section id="home" class="page active">
        <div class="welcome">Bem-vindo! Prepare-se para sua aprovação. Escolha uma modalidade abaixo:</div>
        <div class="home-actions">
          <button class="btn" onclick="go('study')">📘 Estudar Leis</button>
          <button class="btn" onclick="go('quiz')">🎯 Fazer Simulado</button>
          <button class="btn" onclick="go('cards')">🃏 Flashcards</button>
          <a href="./resumos/" class="btn">📄 Resumos</a>
        </div>
        <div style="margin-top:25px; padding:15px; background:rgba(0,0,0,0.2); border-radius:12px; border: 1px
solid var(--card-border);">
          <div id="bestRecord" class="record" style="font-weight:700; color:var(--primary); text-align:
center;">Carregando recorde...</div>
        </div>
      </section>

      <!-- Study -->
      <section id="study" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h3 style="margin:0; font-size:18px;">📚 Conteúdos</h3>
          <button class="btn" onclick="go('home')" style="padding:6px 12px; font-size:12px;">🏠 Voltar</button>
        </div>
        <div id="studyList" class="study-list">Carregando conteúdos...</div>
      </section>

      <!-- Quiz -->
      <section id="quiz" class="page">
        <div class="quiz-shell">
          <div class="page-header-actions">
            <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex:1;">
              <span style="font-weight:700; font-size: 14px; color:var(--text-muted);">Tópico:</span>
              <select id="topicSelect"></select>
              <button class="btn btn-primary" id="loadTopicBtn" style="width:auto;
min-width:80px;">Iniciar</button>
            </div>
            <div class="small" style="background:rgba(255,255,255,0.05); padding:5px 10px; border-radius:8px;
font-size: 12px; color:var(--text-muted);">
              Questões: <strong id="quizSizeLabel" style="color:#fff"></strong>
            </div>
          </div>

          <div class="progress">
            <div class="track"><div class="bar" id="bar"></div></div>
            <div style="font-size:12px; font-weight:800; min-width:40px; color:var(--text-muted);"
id="progressInfo">0 / 0</div>
          </div>

          <div class="quiz-main">
            <div class="question" id="question">Selecione um tópico para começar.</div>
            <div class="opts" id="opts"></div>
            <div class="explain" id="explain" style="display:none"></div>
          </div>

          <div class="quiz-footer" style="display:flex; justify-content:space-between; align-items:center;
margin-top:20px;">
            <div id="progressText" style="font-weight:700; color:var(--primary); font-size: 14px;"></div>
            <div style="display:flex; gap:10px; flex-wrap: wrap;">
              <button class="btn" id="btnRestart" onclick="restartQuiz()" style="display:none">🔄
Reiniciar</button>
              <button class="next-btn" id="nextBtn" disabled>Próxima ➜</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Cards -->
      <section id="cards" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h3 style="margin:0; font-size:18px;">🃏 Flashcards</h3>
          <button class="btn" onclick="go('home')" style="padding:6px 12px; font-size:12px;">🏠 Voltar</button>
        </div>
        <div id="cardsContainer" style="display:grid; grid-template-columns: repeat(auto-fit,minmax(240px,1fr));
gap:15px; margin-top:15px;"></div>
      </section>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" role="navigation" id="tabsBar">
    <button class="tabbtn active" data-target="home" onclick="go('home')"><span>🏠</span>Início</button>
    <button class="tabbtn" data-target="study" onclick="go('study')"><span>📘</span>Estudo</button>
    <button class="tabbtn" data-target="quiz" onclick="go('quiz')"><span>🎯</span>Simulado</button>
    <button class="tabbtn" data-target="cards" onclick="go('cards')"><span>🃏</span>Cartões</button>
  </div>

    firebase.initializeApp(firebaseConfig);
  </script>
  <script src="./js/app.js"></script>
</body>

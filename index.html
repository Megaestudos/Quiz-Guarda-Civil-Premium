<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Quiz Guarda Civil — Plataforma de Estudos</title>
  <meta name="theme-color" content="#0f172a"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app" id="appRoot">

    <!-- Header -->
    <header class="card header" id="cardHeader">
      <div class="header-content">
        <h1 class="title">👮 Guarda Civil</h1>
        <p class="subtitle">Plataforma de Estudos Inteligente</p>
      </div>
      <div class="controls">
        <div class="scale-control">
          <button class="icon-btn" id="scaleDownBtn" title="Diminuir">A−</button>
          <span class="scale-label" id="scaleLabel">100%</span>
          <button class="icon-btn" id="scaleUpBtn" title="Aumentar">A+</button>
        </div>
        <button class="icon-btn" id="soundToggle" title="Som">🔊</button>
        <button class="icon-btn" id="fullscreenBtn" title="Tela Cheia">⛶</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="card pages" id="pages">

      <!-- HOME -->
      <section id="home" class="page active">
        <div class="welcome-box">
          <h2 class="welcome-title">Bem-vindo, Futuro Guarda! 🎯</h2>
          <p class="welcome-text">Prepare-se para sua aprovação com nossa plataforma completa de estudos.</p>
        </div>

        <div class="home-actions">
          <button class="btn btn-primary" onclick="go('study')">
            <span>📘</span> Estudar Leis
          </button>
          <button class="btn btn-primary" onclick="go('quiz')">
            <span>🎯</span> Fazer Simulado
          </button>
          <button class="btn btn-secondary" onclick="go('cards')">
            <span>🃏</span> Flashcards
          </button>
          <a href="./resumos/" class="btn btn-secondary">
            <span>📄</span> Resumos
          </a>
        </div>

        <div class="record-box">
          <div class="record-icon">🏆</div>
          <div class="record-content">
            <span class="record-label">Melhor Desempenho</span>
            <div id="bestRecord" class="record-value">Carregando...</div>
          </div>
        </div>
      </section>

      <!-- STUDY -->
      <section id="study" class="page">
        <div class="page-header">
          <h3 class="page-title">📚 Conteúdos de Estudo</h3>
          <button class="btn btn-sm" onclick="go('home')">🏠 Voltar</button>
        </div>
        <div id="studyList" class="study-list">
          <div class="loading">Carregando conteúdos...</div>
        </div>
      </section>

      <!-- QUIZ -->
      <section id="quiz" class="page">
        <div class="quiz-shell">
          <div class="quiz-header">
            <div class="topic-selector">
              <label class="topic-label">Tópico:</label>
              <select id="topicSelect"></select>
              <button class="btn btn-primary btn-sm" id="loadTopicBtn">Iniciar</button>
            </div>
            <div class="quiz-info">
              <span class="quiz-info-label">Questões:</span>
              <strong id="quizSizeLabel">-</strong>
            </div>
          </div>

          <div class="progress-container">
            <div class="progress-track">
              <div class="progress-bar" id="bar"></div>
            </div>
            <span class="progress-text" id="progressInfo">0 / 0</span>
          </div>

          <div class="quiz-main">
            <div class="question-box">
              <div class="question-topic" id="questionTopic"></div>
              <div class="question-text" id="question"></div>
            </div>
            <div class="opts" id="opts"></div>
            <div class="explain" id="explain"></div>
          </div>

          <div class="quiz-footer">
            <div class="score-display">
              <span class="score-label">Pontuação:</span>
              <span class="score-value" id="progressText">0</span>
            </div>
            <div class="quiz-actions">
              <button class="btn btn-secondary" id="btnRestart" onclick="restartQuiz()">🔄 Reiniciar</button>
              <button class="btn btn-primary" id="nextBtn" disabled>Próxima →</button>
            </div>
          </div>
        </div>
      </section>

      <!-- CARDS -->
      <section id="cards" class="page">
        <div class="page-header">
          <h3 class="page-title">🃏 Flashcards</h3>
          <button class="btn btn-sm" onclick="go('home')">🏠 Voltar</button>
        </div>
        <div id="cardsContainer" class="cards-grid"></div>
      </section>

    </main>
  </div>

  <!-- Navigation Tabs -->
  <nav class="tabs" id="tabsBar" role="navigation">
    <button class="tabbtn active" data-target="home" onclick="go('home')">
      <span class="tab-icon">🏠</span>
      <span class="tab-text">Início</span>
    </button>
    <button class="tabbtn" data-target="study" onclick="go('study')">
      <span class="tab-icon">📘</span>
      <span class="tab-text">Estudo</span>
    </button>
    <button class="tabbtn" data-target="quiz" onclick="go('quiz')">
      <span class="tab-icon">🎯</span>
      <span class="tab-text">Simulado</span>
    </button>
    <button class="tabbtn" data-target="cards" onclick="go('cards')">
      <span class="tab-icon">🃏</span>
      <span class="tab-text">Cartões</span>
    </button>
  </nav>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB36ZszS8v_DeOn3at7zEo_tFq86WU0sI4",
      authDomain: "simulados-concursos-22c91.firebaseapp.com",
      projectId: "simulados-concursos-22c91",
      storageBucket: "simulados-concursos-22c91.firebasestorage.app",
      messagingSenderId: "863699339166",
      appId: "1:863699339166:web:8514155da2229b41ae388f"
    };
    firebase.initializeApp(firebaseConfig);
  </script>

  <script src="app.js"></script>
</body>
</html>

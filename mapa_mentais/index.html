<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa Mental Profissional</title>

<style>
body {
  background: #0b0f19;
  color: #e2e8f0;
  font-family: "Segoe UI", sans-serif;
  padding: 30px;
}

/* ÁRVORE */
.tree ul {
  padding-left: 20px;
  position: relative;
}

.tree li {
  list-style: none;
  margin: 10px 0;
  position: relative;
}

/* LINHAS */
.tree li::before {
  content: "";
  position: absolute;
  top: -10px;
  left: -15px;
  border-left: 1px solid #334155;
  height: 100%;
}

.tree li::after {
  content: "";
  position: absolute;
  top: 14px;
  left: -15px;
  border-top: 1px solid #334155;
  width: 15px;
}

/* CAIXA */
.node {
  display: inline-flex;
  align-items: center;
  background: #1e293b;
  padding: 6px 12px;
  border-radius: 20px;
  transition: 0.3s;
}

.node:hover {
  background: #334155;
}

/* SETA */
.arrow {
  margin-right: 8px;
  font-size: 12px;
  transition: transform 0.3s;
}

/* FILHOS */
.children {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

/* ABERTO */
.open > .children {
  max-height: 500px;
}

.open > .node .arrow {
  transform: rotate(90deg);
}
</style>
</head>

<body>

<h2>📚 Lei de Abuso de Autoridade</h2>

<div class="tree">
<ul>

<li>
  <div class="node">
    <span class="arrow">▶</span>
    Lei 13.869/2019
  </div>

  <ul class="children">

    <li>
      <div class="node">
        <span class="arrow">▶</span>
        Sujeitos
      </div>

      <ul class="children">
        <li><div class="node">Agente público</div></li>
        <li><div class="node">Servidor público</div></li>
      </ul>
    </li>

    <li>
      <div class="node">
        <span class="arrow">▶</span>
        Condutas
      </div>

      <ul class="children">
        <li><div class="node">Prisão ilegal</div></li>
        <li><div class="node">Violação de domicílio</div></li>
        <li><div class="node">Constrangimento ilegal</div></li>
      </ul>
    </li>

    <li>
      <div class="node">
        <span class="arrow">▶</span>
        Penas
      </div>

      <ul class="children">
        <li><div class="node">Detenção</div></li>
        <li><div class="node">Multa</div></li>
        <li><div class="node">Perda do cargo</div></li>
      </ul>
    </li>

  </ul>
</li>

</ul>
</div>

<script>
document.querySelectorAll(".node").forEach(node => {
  node.addEventListener("click", function(e) {
    const parentLi = this.parentElement;

    if (parentLi.querySelector(".children")) {
      parentLi.classList.toggle("open");
    }

    e.stopPropagation();
  });
});
</script>

</body>
</html>

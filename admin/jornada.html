<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlenAula Admin - Jornada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border-right: 3px solid #3b82f6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 border-r border-white/5 bg-[#020617] flex flex-col z-[100] transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out">
        <div class="p-8 pb-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight">PlenAula</span>
            </div>
            <button class="lg:hidden text-gray-400" onclick="toggleSidebar()"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-1">
            <a href="painel.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="students.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="users" class="w-5 h-5"></i> Alunos
            </a>
            <a href="contents.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="book-open" class="w-5 h-5"></i> Biblioteca
            </a>
            <a href="jornada.html" class="sidebar-item active flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium">
                <i data-lucide="map" class="w-5 h-5"></i> Jornada
            </a>
            <a href="simulados.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="file-text" class="w-5 h-5"></i> Simulados
            </a>
            <a href="financial.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="circle-dollar-sign" class="w-5 h-5"></i> Financeiro
            </a>
        </nav>
        <div class="p-4 border-t border-white/5">
            <button id="btnLogout" class="w-full flex items-center gap-3 px-4 py-2 text-gray-400 hover:text-red-500 transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sair
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#020617] relative overflow-y-auto">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-10">
            <h1 class="text-xl font-bold">Conteúdo da Jornada</h1>
        </header>

        <div class="p-10 flex flex-col gap-8 max-w-5xl">
            <!-- Seletores -->
            <div class="glass-panel p-6 rounded-3xl grid grid-cols-1 md:grid-cols-4 gap-6">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Carreira</label>
                    <select id="selCarreira" class="w-full bg-[#0f172a] border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white">
                        <option value="">Carregando...</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Módulo</label>
                    <select id="selModulo" class="w-full bg-[#0f172a] border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white" disabled>
                        <option value="">Selecione a Carreira</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Missão</label>
                    <select id="selMissao" class="w-full bg-[#0f172a] border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white" disabled>
                        <option value="">Selecione o Módulo</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Etapa</label>
                    <select id="selEtapa" class="w-full bg-[#0f172a] border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white" disabled>
                        <option value="">Selecione a Missão</option>
                        <option value="aprender">Aprender (Vídeos/Áudios)</option>
                        <option value="resumo">Resumo Rápido (Textos)</option>
                    </select>
                </div>
            </div>

            <!-- Área de CMS -->
            <div id="cmsArea" class="hidden flex-col gap-6">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 id="cmsTitle" class="text-2xl font-bold text-white">Missão</h2>
                        <p id="cmsSubtitle" class="text-sm text-gray-400">Gerencie os blocos de conteúdo desta missão</p>
                    </div>
                    <button onclick="window.openCmsModal()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 transition-all rounded-lg text-sm font-bold shadow-lg shadow-indigo-600/20 flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> Adicionar Bloco
                    </button>
                </div>
                
                <div id="cmsList" class="space-y-4">
                    <!-- Cards de conteúdo -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal CMS Block -->
    <div id="modalCms" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="glass-panel w-full max-w-xl rounded-[32px] p-8 animate-fade-in shadow-2xl border-white/10">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Adicionar Bloco de Conteúdo</h2>
                <button onclick="window.closeCmsModal()" class="text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Tipo</label>
                    <select id="cmsType" class="w-full bg-[#0f172a] border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white" onchange="window.toggleCmsFields()">
                        <option value="video">Vídeo (YouTube/MP4)</option>
                        <option value="audio">Áudio (Podcast)</option>
                        <option value="resumo">Resumo (Texto Longo)</option>
                    </select>
                </div>
                
                <!-- Campos de Mídia (Video/Audio) -->
                <div id="mediaFields" class="space-y-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Título do Bloco</label>
                        <input type="text" id="cmsTitleInput" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm" placeholder="ex: Aula 01 - Princípios">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">URL ou ID do YouTube</label>
                        <input type="text" id="cmsUrl" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm" placeholder="URL ou ID">
                    </div>
                    <div id="audioDurField" class="hidden">
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Duração (Áudio)</label>
                        <input type="text" id="cmsDuration" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm" placeholder="ex: 15 min">
                    </div>
                </div>

                <!-- Campos de Texto (Resumo) -->
                <div id="textFields" class="hidden space-y-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Conteúdo (Suporta HTML básico)</label>
                        <textarea id="cmsContent" rows="6" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm" placeholder="Digite o resumo aqui..."></textarea>
                    </div>
                </div>

                <button onclick="window.saveCmsBlock()" id="btnSaveCms" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-600/20 transition-all mt-4">
                    Salvar no Firebase
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Carrega a Jornada estática para popular os dropdowns -->
    <script src="../js/jornada.js"></script>
    <script type="module" src="jornada-integration.js"></script>
    <script>
        lucide.createIcons();
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        
        window.toggleCmsFields = function() {
            const type = document.getElementById('cmsType').value;
            if (type === 'resumo') {
                document.getElementById('mediaFields').classList.add('hidden');
                document.getElementById('textFields').classList.remove('hidden');
            } else {
                document.getElementById('mediaFields').classList.remove('hidden');
                document.getElementById('textFields').classList.add('hidden');
                if (type === 'audio') {
                    document.getElementById('audioDurField').classList.remove('hidden');
                } else {
                    document.getElementById('audioDurField').classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>

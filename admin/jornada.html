<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlenAula Admin - Jornada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border-right: 3px solid #3b82f6; }
        
        /* Modal Scroll */
        .modal-scroll { max-height: 80vh; overflow-y: auto; padding-right: 10px; }
        .modal-scroll::-webkit-scrollbar { width: 6px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 border-r border-white/5 bg-[#020617] flex flex-col z-[100] transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out">
        <div class="p-8 pb-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight">PlenAula</span>
            </div>
            <button class="lg:hidden text-gray-400" onclick="toggleSidebar()"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-1">
            <a href="painel.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="students.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="users" class="w-5 h-5"></i> Alunos
            </a>
            <a href="contents.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="book-open" class="w-5 h-5"></i> Biblioteca
            </a>
            <a href="jornada.html" class="sidebar-item active flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium">
                <i data-lucide="map" class="w-5 h-5"></i> Jornada
            </a>
            <a href="simulados.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="file-text" class="w-5 h-5"></i> Simulados
            </a>
            <a href="financial.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="circle-dollar-sign" class="w-5 h-5"></i> Financeiro
            </a>
        </nav>
        <div class="p-4 border-t border-white/5">
            <button id="btnLogout" class="w-full flex items-center gap-3 px-4 py-2 text-gray-400 hover:text-red-500 transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sair
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#020617] relative overflow-y-auto">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-10">
            <h1 class="text-xl font-bold">Conteúdo da Jornada</h1>
            <button onclick="window.openMissaoModal()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 transition-all rounded-lg text-sm font-bold shadow-lg flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> Nova Missão
            </button>
        </header>

        <div class="p-10 flex flex-col gap-6 max-w-6xl mx-auto w-full">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold text-white">Missões Cadastradas</h2>
            </div>

            <!-- Tabela de Missões -->
            <div class="glass-panel rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-gray-400">
                        <thead class="text-xs uppercase bg-white/5 border-b border-white/10 text-gray-500">
                            <tr>
                                <th class="px-6 py-4 font-bold tracking-wider">Módulo/Matéria</th>
                                <th class="px-6 py-4 font-bold tracking-wider">Missão (Assunto/Subassunto)</th>
                                <th class="px-6 py-4 font-bold tracking-wider">Ordem</th>
                                <th class="px-6 py-4 font-bold tracking-wider">Tipo (Vídeo/Áudio)</th>
                                <th class="px-6 py-4 font-bold tracking-wider">Status</th>
                                <th class="px-6 py-4 font-bold tracking-wider text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="missoesList" class="divide-y divide-white/5">
                            <!-- JS popula aqui -->
                            <tr><td colspan="6" class="text-center py-8"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-blue-500"></i></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Nova/Editar Missão -->
    <div id="modalMissao" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="glass-panel w-full max-w-2xl rounded-[32px] p-8 animate-fade-in shadow-2xl border-white/10 flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-6 flex-shrink-0">
                <h2 id="modalTitle" class="text-xl font-bold">Cadastrar Missão</h2>
                <button onclick="window.closeMissaoModal()" class="text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-5 modal-scroll flex-1">
                <input type="hidden" id="mId">
                
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Matéria (Módulo)</label>
                        <select id="mMateria" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white" onchange="window.onMateriaChange()">
                            <option value="">Selecione a Matéria</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Assunto</label>
                        <select id="mAssunto" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white" onchange="window.onAssuntoChange()">
                            <option value="">Selecione o Assunto</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Subassunto (Opcional - Vira a Missão se existir)</label>
                        <select id="mSubassunto" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white">
                            <option value="">Nenhum (Usar Assunto principal)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Ordem no Módulo</label>
                        <input type="number" id="mOrdem" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white" value="1">
                    </div>
                </div>

                <div class="border-t border-white/10 pt-4 mt-4">
                    <h3 class="text-sm font-bold text-indigo-400 mb-3"><i data-lucide="book-open" class="inline w-4 h-4 mr-1"></i> Conteúdo (Etapa Aprender)</h3>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-1">
                            <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Tipo</label>
                            <select id="mAprenderTipo" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white">
                                <option value="video">Vídeo (YouTube)</option>
                                <option value="audio">Áudio (URL externa)</option>
                            </select>
                        </div>
                        <div class="col-span-2">
                            <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">URL do Conteúdo</label>
                            <input type="text" id="mAprenderUrl" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white" placeholder="https://...">
                        </div>
                    </div>
                </div>

                <div class="border-t border-white/10 pt-4 mt-4">
                    <h3 class="text-sm font-bold text-emerald-400 mb-3"><i data-lucide="file-text" class="inline w-4 h-4 mr-1"></i> Resumo (Etapa Resumo)</h3>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">URL do PDF</label>
                        <input type="text" id="mPdfUrl" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white" placeholder="https://...">
                    </div>
                </div>

                <div class="border-t border-white/10 pt-4 mt-4 flex items-center justify-between">
                    <div>
                    </div>
                    
                    <label class="flex items-center gap-3 cursor-pointer mt-4">
                        <span class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Missão Ativa</span>
                        <div class="relative">
                            <input type="checkbox" id="mAtivo" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mt-6 flex-shrink-0">
                <button onclick="window.saveMissao()" id="btnSaveMissao" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-600/20 transition-all">
                    Salvar Missão no Firebase
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="jornada-integration.js?v=2"></script>
    <script>
        if (window.lucide) {
            lucide.createIcons();
        }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
    </script>
</body>
</html>

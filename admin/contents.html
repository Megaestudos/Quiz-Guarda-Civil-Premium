<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlenAula - Gestão de Conteúdos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border-right: 3px solid #3b82f6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar (Responsive) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 border-r border-white/5 bg-[#020617] flex flex-col z-[100] transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out">
        <div class="p-8 pb-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight">PlenAula</span>
            </div>
            <button class="lg:hidden text-gray-400" onclick="toggleSidebar()"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-1">
            <a href="painel.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="students.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="users" class="w-5 h-5"></i> Alunos
            </a>
            <a href="contents.html" class="sidebar-item active flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium">
                <i data-lucide="book-open" class="w-5 h-5"></i> Conteúdos
            </a>
            <a href="simulados.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="file-text" class="w-5 h-5"></i> Simulados
            </a>
            <a href="financial.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="circle-dollar-sign" class="w-5 h-5"></i> Financeiro
            </a>
            <a href="ai-control.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="brain-circuit" class="w-5 h-5"></i> Inteligência AI
            </a>
        </nav>
        <div class="p-4 border-t border-white/5">
            <button id="btnLogout" class="w-full flex items-center gap-3 px-4 py-2 text-gray-400 hover:text-red-500 transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sair
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#020617] relative overflow-y-auto">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-10">
            <h1 class="text-xl font-bold">Gestão de Conteúdo</h1>
            <button onclick="window.openSubjectModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 transition-all rounded-lg text-sm font-bold shadow-lg shadow-blue-600/20">+ Nova Matéria</button>
        </header>

        <div class="p-10 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="contentsGrid">
                <!-- Subjects will be loaded here -->
                <div class="glass-panel p-6 rounded-3xl animate-pulse h-40"></div>
                <div class="glass-panel p-6 rounded-3xl animate-pulse h-40"></div>
                <div class="glass-panel p-6 rounded-3xl animate-pulse h-40"></div>
            </div>
        </div>
    </main>

    <!-- Modal Subject -->
    <div id="modalSubject" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="glass-panel w-full max-w-md rounded-[32px] p-8 animate-fade-in shadow-2xl border-white/10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="subjectModalTitle" class="text-xl font-bold">Nova Matéria</h2>
                <button onclick="window.closeSubjectModal()" class="text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4">
                <input type="hidden" id="subjectId">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">ID (Padrão: auto)</label>
                    <input type="text" id="subjectFriendlyId" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-gray-300" placeholder="direito-penal">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Nome da Matéria</label>
                    <input type="text" id="subjectName" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm" placeholder="Direito Penal">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Ícone (Lucide)</label>
                    <input type="text" id="subjectIcon" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm" placeholder="book">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Arquivo do Resumo (Opcional)</label>
                    <input type="text" id="subjectResumo" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm" placeholder="resumo.html">
                </div>
                <button onclick="window.saveSubject()" id="btnSaveSubject" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all mt-4">
                    Salvar Matéria
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Media -->
    <div id="modalMedia" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="glass-panel w-full max-w-md rounded-[32px] p-8 animate-fade-in shadow-2xl border-white/10">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Adicionar Mídia</h2>
                <button onclick="window.closeMediaModal()" class="text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4">
                <input type="hidden" id="mediaSubjectId">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Tipo de Mídia</label>
                    <select id="mediaTypeSelect" class="w-full bg-[#0f172a] border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm text-white">
                        <option value="videos">Vídeo (YouTube ID)</option>
                        <option value="audios">Áudio (URL direta)</option>
                        <option value="slides">PDF / Slide (URL direta)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Título da Aula/Conteúdo</label>
                    <input type="text" id="mediaTitle" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm" placeholder="Aula 1: Introdução...">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">URL ou ID do YouTube</label>
                    <input type="text" id="mediaUrl" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm" placeholder="ex: dQw4w9WgXcQ">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Resumo/Duração (Opcional)</label>
                    <input type="text" id="mediaDur" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 focus:border-blue-500 outline-none text-sm placeholder:text-gray-600" placeholder="ex: 15 min">
                </div>
                <button onclick="window.saveMedia()" id="btnSaveMedia" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-600/20 transition-all mt-4">
                    Salvar Mídia
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="admin-v2-integration.js"></script>
    <script>
        lucide.createIcons();
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
    </script>
</body>
</html>

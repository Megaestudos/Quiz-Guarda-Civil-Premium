<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlenAula - Gestão de Conteúdos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border-right: 3px solid #3b82f6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar (Responsive) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 border-r border-white/5 bg-[#020617] flex flex-col z-[100] transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out">
        <div class="p-8 pb-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight">PlenAula</span>
            </div>
            <button class="lg:hidden text-gray-400" onclick="toggleSidebar()"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-1">
            <a href="painel.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="students.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="users" class="w-5 h-5"></i> Alunos
            </a>
            <a href="contents.html" class="sidebar-item active flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium">
                <i data-lucide="book-open" class="w-5 h-5"></i> Conteúdos
            </a>
            <a href="simulados.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="file-text" class="w-5 h-5"></i> Simulados
            </a>
            <a href="financial.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="circle-dollar-sign" class="w-5 h-5"></i> Financeiro
            </a>
            <a href="ai-control.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium text-gray-400">
                <i data-lucide="brain-circuit" class="w-5 h-5"></i> Inteligência AI
            </a>
        </nav>
        <div class="p-4 border-t border-white/5">
            <button id="btnLogout" class="w-full flex items-center gap-3 px-4 py-2 text-gray-400 hover:text-red-500 transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sair
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#020617] relative overflow-y-auto">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-10">
            <h1 class="text-xl font-bold">Gestão de Conteúdo</h1>
            <button class="px-4 py-2 bg-blue-600 rounded-lg text-sm font-bold shadow-lg shadow-blue-600/20">+ Nova Matéria</button>
        </header>

        <div class="p-10 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="contentsGrid">
                <!-- Subjects will be loaded here -->
                <div class="glass-panel p-6 rounded-3xl animate-pulse h-40"></div>
                <div class="glass-panel p-6 rounded-3xl animate-pulse h-40"></div>
                <div class="glass-panel p-6 rounded-3xl animate-pulse h-40"></div>
            </div>
        </div>
    </main>

    <script type="module" src="admin-v2-integration.js"></script>
    <script>
        lucide.createIcons();
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
    </script>
</body>
</html>

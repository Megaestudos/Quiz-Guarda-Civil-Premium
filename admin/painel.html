<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f172a;
      --panel-2:#111c31;
      --border:#1e293b;
      --primary:#2563eb;
      --primary-dark:#1e40af;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --success:#10b981;
      --warning:#f59e0b;
      --danger:#ef4444;
      --radius:18px;
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:
        radial-gradient(120% 100% at 20% 20%, rgba(37,99,235,.20), transparent 60%),
        radial-gradient(120% 100% at 80% 10%, rgba(16,185,129,.12), transparent 60%),
        var(--bg);
      color:var(--text);
    }

    .container{
      max-width:1280px;
      margin:0 auto;
      padding:20px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .title-wrap h1{
      margin:0;
      font-size:28px;
      font-weight:800;
      letter-spacing:-0.5px;
    }

    .title-wrap p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .header-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .button{
      padding:10px 16px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      color:#fff;
      font-weight:700;
      transition:.2s ease;
      box-shadow:0 6px 18px rgba(0,0,0,.18);
    }

    .button:hover{
      transform:translateY(-1px);
      opacity:.96;
    }

    .button-refresh{
      background:linear-gradient(135deg,var(--success),#059669);
    }

    .button-logout{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    }

    .status{
      margin-bottom:18px;
      padding:14px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:var(--text);
      box-shadow:var(--shadow);
    }

    .dashboard{
      display:grid;
      grid-template-columns:repeat(4, minmax(180px, 1fr));
      gap:16px;
      margin-bottom:18px;
    }

    .stat-card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .stat-label{
      color:var(--muted);
      font-size:13px;
      margin-bottom:10px;
      font-weight:600;
    }

    .stat-value{
      font-size:30px;
      font-weight:800;
      line-height:1;
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:16px;
      flex-wrap:wrap;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .search-wrap{
      flex:1;
      min-width:260px;
    }

    .search-input{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      outline:none;
      background:#0b1426;
      color:#fff;
      font-size:14px;
    }

    .search-input::placeholder{
      color:#7c8aa5;
    }

    .result-info{
      color:var(--muted);
      font-size:14px;
      font-weight:600;
    }

    .table-wrapper{
      overflow:auto;
      background:var(--panel);
      border-radius:18px;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:900px;
    }

    th, td{
      padding:14px 12px;
      text-align:left;
      border-bottom:1px solid var(--border);
      vertical-align:middle;
      font-size:14px;
    }

    th{
      position:sticky;
      top:0;
      z-index:1;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    tbody tr:hover{
      background:rgba(255,255,255,.04);
    }

    .email{
      font-weight:700;
      color:#fff;
    }

    .uid{
      font-family:monospace;
      font-size:12px;
      color:#cbd5e1;
      word-break:break-all;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(37,99,235,.18);
      border:1px solid rgba(37,99,235,.35);
      color:#dbeafe;
      font-size:12px;
      font-weight:700;
      margin:2px 6px 2px 0;
      white-space:nowrap;
    }

    .empty-state{
      padding:22px;
      text-align:center;
      color:var(--muted);
    }

    @media (max-width: 980px){
      .dashboard{
        grid-template-columns:repeat(2, minmax(180px, 1fr));
      }
    }

    @media (max-width: 640px){
      .container{
        padding:14px;
      }

      .dashboard{
        grid-template-columns:1fr;
      }

      .title-wrap h1{
        font-size:24px;
      }

      .button{
        width:100%;
      }

      .header-actions{
        width:100%;
      }

      .header-actions .button{
        flex:1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-wrap">
        <h1>Painel Admin</h1>
        <p>Controle de usuários do app PlenAula</p>
      </div>

      <div class="header-actions">
        <button class="button button-refresh" id="btnRefresh">Atualizar</button>
        <button class="button button-logout" id="btnLogout">Sair</button>
      </div>
    </div>

    <div class="status" id="statusMsg">Verificando login...</div>

    <div class="dashboard">
      <div class="stat-card">
        <div class="stat-label">Usuários totais</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Usuários com e-mail</div>
        <div class="stat-value" id="statComEmail">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Logaram hoje</div>
        <div class="stat-value" id="statHoje">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Criados hoje</div>
        <div class="stat-value" id="statNovosHoje">0</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Buscar por e-mail, UID ou provedor..."
        >
      </div>

      <div class="result-info" id="resultInfo">0 resultados</div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>E-mail</th>
            <th>UID</th>
            <th>Provedores</th>
            <th>Criação</th>
            <th>Último Login</th>
          </tr>
        </thead>
        <tbody id="tabelaUsuarios">
          <tr>
            <td colspan="5" class="empty-state">Carregando usuários...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
